name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Shell Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run shell test suite
        run: bash tests/run.sh
